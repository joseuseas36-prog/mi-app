<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productividad Ultra + Tablas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ===== FONDO PREMIUM ANIMADO ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
    background-size:400% 400%;
    animation:fondo 15s ease infinite;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}
@keyframes fondo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== PANTALLA PIN ===== */
#lockScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}
.pin-box{
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(25px);
    border:3px solid transparent;
    animation:borderGlow 4s linear infinite;
    text-align:center;
}
@keyframes borderGlow{
    0%{border-color:#00f2ff;}
    25%{border-color:#ff00c8;}
    50%{border-color:#00ff88;}
    75%{border-color:#ffae00;}
    100%{border-color:#00f2ff;}
}
input{
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    text-align:center;
    font-size:18px;
}
button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#00f2ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    background:#ff00c8;
    color:white;
}

/* ===== CONTENIDO PRINCIPAL ===== */
.container{
    width:100%;
    max-width:1000px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:30px;
    backdrop-filter:blur(20px);
    border:3px solid transparent;
    animation:borderGlow 6s linear infinite;
    text-align:center;
}

/* ===== BARRA META ===== */
.progress-container{
    margin:20px 0;
    background:#222;
    border-radius:20px;
    overflow:hidden;
    height:25px;
}
.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00f2ff,#ff00c8);
    transition:width 1s ease;
}

/* ===== TABLAS SEMANALES ===== */
.barra-superior{
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:40px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
}
.barra-superior input, .barra-superior button{
    padding:8px 15px;
    border-radius:30px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}
.semana{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    margin:20px 0;
}
.dias{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
    margin:10px 0;
}
.dias div{
    display:flex;
    flex-direction:column;
}
.dias label{
    font-weight:bold;
    font-size:0.8rem;
    color:#ffc107;
}
.dias input{
    padding:5px;
    border-radius:20px;
    border:2px solid #00f2ff;
    text-align:center;
    width:100%;
    background:rgba(0,0,0,0.3);
    color:white;
}

/* ===== GRÁFICAS ===== */
.graficas{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin:30px 0;
}
canvas{
    background:rgba(0,0,0,0.2);
    border-radius:15px;
    padding:10px;
    max-height:200px;
}

/* ===== RESULTADOS ===== */
.result{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    margin-top:20px;
    font-size:1.2rem;
}
.result span{
    font-weight:bold;
    color:#1e3c72;
    background:#ffc107;
    padding:3px 15px;
    border-radius:30px;
    display:inline-block;
    margin:3px;
}
</style>
</head>
<body>

<!-- ===== PANTALLA DE BLOQUEO ===== -->
<div id="lockScreen">
    <div class="pin-box">
        <h2>🔐 Acceso Ultra Premium</h2>
        <input type="password" id="pinInput" placeholder="Ingrese PIN">
        <br>
        <button onclick="verificarPin()">Entrar</button>
        <p id="error" style="color:red;"></p>
    </div>
</div>

<!-- ===== CONTENIDO ===== -->
<div class="container">
    <h1>🚀 PRODUCTIVIDAD ULTRA</h1>
    <h3>Meta Mensual 120%</h3>

    <div class="progress-container">
        <div class="progress-bar" id="barra"></div>
    </div>

    <div class="barra-superior">
        <span>📆 Mes:</span>
        <input type="month" id="selectorMes" value="2026-03">
        <button onclick="cargarMes()">📂 Cargar Mes</button>
        <button onclick="guardarMes()">💾 Guardar Mes</button>
        <button onclick="reiniciarMes()">🆕 Nuevo Mes</button>
    </div>

    <!-- Semana 1 -->
    <div class="semana">
        <h3>📅 SEMANA 1</h3>
        <div class="dias">
            <div><label>Lun</label><input type="number" id="s1d1" value="124" step="0.1"></div>
            <div><label>Mar</label><input type="number" id="s1d2" value="146" step="0.1"></div>
            <div><label>Mié</label><input type="number" id="s1d3" value="120" step="0.1"></div>
            <div><label>Jue</label><input type="number" id="s1d4" value="100" step="0.1"></div>
            <div><label>Vie</label><input type="number" id="s1d5" value="79" step="0.1"></div>
            <div><label>Sáb</label><input type="number" id="s1d6" value="130" step="0.1"></div>
        </div>
        <p>📈 Semana 1: <strong id="semana1Total">116.5%</strong></p>
    </div>

    <!-- Semana 2 -->
    <div class="semana">
        <h3>📅 SEMANA 2</h3>
        <div class="dias">
            <div><label>Lun</label><input type="number" id="s2d1" value="110" step="0.1"></div>
            <div><label>Mar</label><input type="number" id="s2d2" value="110" step="0.1"></div>
            <div><label>Mié</label><input type="number" id="s2d3" value="110" step="0.1"></div>
            <div><label>Jue</label><input type="number" id="s2d4" value="110" step="0.1"></div>
            <div><label>Vie</label><input type="number" id="s2d5" value="110" step="0.1"></div>
            <div><label>Sáb</label><input type="number" id="s2d6" value="110" step="0.1"></div>
        </div>
        <p>📈 Semana 2: <strong id="semana2Total">110.0%</strong></p>
    </div>

    <!-- Semana 3 -->
    <div class="semana">
        <h3>📅 SEMANA 3</h3>
        <div class="dias">
            <div><label>Lun</label><input type="number" id="s3d1" value="101" step="0.1"></div>
            <div><label>Mar</label><input type="number" id="s3d2" value="101" step="0.1"></div>
            <div><label>Mié</label><input type="number" id="s3d3" value="101" step="0.1"></div>
            <div><label>Jue</label><input type="number" id="s3d4" value="101" step="0.1"></div>
            <div><label>Vie</label><input type="number" id="s3d5" value="101" step="0.1"></div>
            <div><label>Sáb</label><input type="number" id="s3d6" value="101" step="0.1"></div>
        </div>
        <p>📈 Semana 3: <strong id="semana3Total">101.0%</strong></p>
    </div>

    <!-- Semana 4 -->
    <div class="semana">
        <h3>📅 SEMANA 4</h3>
        <div class="dias">
            <div><label>Lun</label><input type="number" id="s4d1" value="104" step="0.1"></div>
            <div><label>Mar</label><input type="number" id="s4d2" value="104" step="0.1"></div>
            <div><label>Mié</label><input type="number" id="s4d3" value="104" step="0.1"></div>
            <div><label>Jue</label><input type="number" id="s4d4" value="104" step="0.1"></div>
            <div><label>Vie</label><input type="number" id="s4d5" value="104" step="0.1"></div>
            <div><label>Sáb</label><input type="number" id="s4d6" value="104" step="0.1"></div>
        </div>
        <p>📈 Semana 4: <strong id="semana4Total">104.0%</strong></p>
    </div>

    <!-- GRÁFICAS -->
    <div class="graficas">
        <canvas id="graficaSemanal"></canvas>
        <canvas id="graficaMensual"></canvas>
    </div>

    <button onclick="calcularMensual()">📊 CALCULAR MENSUAL</button>

    <div class="result" id="resultado">
        <p>📊 Promedio mensual: <span id="mensual">108.0%</span></p>
        <p>🎯 Rango: <span id="rango">100% - 109.99%</span></p>
        <p>💰 Incentivo: <span id="incentivo">C$ 2,700</span></p>
    </div>
</div>

<script>
// ==================== PIN ====================
const PIN_CORRECTO = "ngarcia";
function verificarPin(){
    const pin = document.getElementById("pinInput").value;
    if(pin === PIN_CORRECTO){
        document.getElementById("lockScreen").style.display="none";
    }else{
        document.getElementById("error").innerText="PIN Incorrecto";
    }
}

// ==================== GRÁFICAS ====================
let ctxSemanal = document.getElementById('graficaSemanal').getContext('2d');
let ctxMensual = document.getElementById('graficaMensual').getContext('2d');

let graficaSemanal, graficaMensual;

function actualizarGraficas(){
    let semanas = [];
    for(let i=1; i<=4; i++){
        let suma = 0;
        for(let j=1; j<=6; j++){
            let val = parseFloat(document.getElementById(`s${i}d${j}`).value) || 0;
            suma += val;
        }
        semanas.push((suma/6).toFixed(1));
    }
    
    if(graficaSemanal) graficaSemanal.destroy();
    if(graficaMensual) graficaMensual.destroy();
    
    graficaSemanal = new Chart(ctxSemanal, {
        type:'line',
        data:{
            labels:['Sem1','Sem2','Sem3','Sem4'],
            datasets:[{
                label:'% Semanal',
                data:semanas,
                borderColor:'#00f2ff',
                backgroundColor:'rgba(0,242,255,0.2)',
                borderWidth:3
            }]
        },
        options:{
            responsive:true,
            plugins:{legend:{labels:{color:'white'}}},
            scales:{
                x:{ticks:{color:'white'}},
                y:{ticks:{color:'white'}}
            }
        }
    });
    
    let mensual = semanas.reduce((a,b)=>parseFloat(a)+parseFloat(b),0)/4;
    
    graficaMensual = new Chart(ctxMensual, {
        type:'bar',
        data:{
            labels:['Promedio'],
            datasets:[{
                label:'% Mensual',
                data:[mensual],
                backgroundColor:'#ff00c8',
                borderRadius:10
            }]
        },
        options:{
            responsive:true,
            plugins:{legend:{labels:{color:'white'}}},
            scales:{
                y:{ticks:{color:'white'}, max:200}
            }
        }
    });
    
    // Actualizar barra
    document.getElementById('barra').style.width = mensual + '%';
}

// ==================== GUARDADO ====================
function obtenerIdMes() {
    return document.getElementById('selectorMes').value || '2026-03';
}

function guardarMes() {
    let mesId = obtenerIdMes();
    let datos = {};
    for(let s=1; s<=4; s++) {
        datos[`semana${s}`] = [];
        for(let d=1; d<=6; d++) {
            datos[`semana${s}`].push(document.getElementById(`s${s}d${d}`).value);
        }
    }
    localStorage.setItem(`productividad_${mesId}`, JSON.stringify(datos));
    alert(`✅ Mes ${mesId} guardado`);
}

function cargarMes() {
    let mesId = obtenerIdMes();
    let datos = localStorage.getItem(`productividad_${mesId}`);
    if(!datos){ alert('❌ No hay datos'); return; }
    datos = JSON.parse(datos);
    for(let s=1; s<=4; s++) {
        for(let d=1; d<=6; d++) {
            document.getElementById(`s${s}d${d}`).value = datos[`semana${s}`][d-1];
        }
    }
    calcularMensual();
    alert(`✅ Mes ${mesId} cargado`);
}

function reiniciarMes() {
    if(confirm('¿Nuevo mes?')) {
        let valores = [
            [124,146,120,100,79,130],
            [110,110,110,110,110,110],
            [101,101,101,101,101,101],
            [104,104,104,104,104,104]
        ];
        for(let s=1; s<=4; s++) {
            for(let d=1; d<=6; d++) {
                document.getElementById(`s${s}d${d}`).value = valores[s-1][d-1];
            }
        }
        calcularMensual();
    }
}

// ==================== CÁLCULO ====================
function calcularSemana(semana){
    let suma = 0;
    for(let i=1; i<=6; i++){
        suma += parseFloat(document.getElementById(`${semana}d${i}`).value) || 0;
    }
    let prom = (suma/6).toFixed(1);
    document.getElementById(`${semana}Total`).innerText = prom + '%';
    return parseFloat(prom);
}

function calcularMensual(){
    let s1 = calcularSemana('s1');
    let s2 = calcularSemana('s2');
    let s3 = calcularSemana('s3');
    let s4 = calcularSemana('s4');
    
    let mensual = (s1+s2+s3+s4)/4;
    document.getElementById('mensual').innerText = mensual.toFixed(1) + '%';
    
    let rango='', incentivo=0;
    if(mensual>=130){ rango="130% o más"; incentivo=3150; }
    else if(mensual>=120){ rango="120-129.99%"; incentivo=3000; }
    else if(mensual>=110){ rango="110-119.99%"; incentivo=2850; }
    else if(mensual>=100){ rango="100-109.99%"; incentivo=2700; }
    else if(mensual>=90){ rango="90-99.99%"; incentivo=2400; }
    else if(mensual>=80){ rango="80-89.99%"; incentivo=2100; }
    else { rango="<80%"; incentivo=0; }
    
    document.getElementById('rango').innerText = rango;
    document.getElementById('incentivo').innerText = 'C$ '+incentivo;
    
    actualizarGraficas();
}

// ==================== EVENTOS ====================
for(let s=1; s<=4; s++){
    for(let d=1; d<=6; d++){
        document.getElementById(`s${s}d${d}`).addEventListener('input', calcularMensual);
    }
}

calcularMensual();
</script>

</body>
</html>
