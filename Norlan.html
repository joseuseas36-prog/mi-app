<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productividad Ultra VIP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* PANTALLA PIN */
#lockScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.pin-box{
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    backdrop-filter: blur(20px);
    border:2px solid transparent;
    animation:borderGlow 3s linear infinite;
}

@keyframes borderGlow{
    0%{border-color:#00f2ff;}
    25%{border-color:#ff00c8;}
    50%{border-color:#00ff88;}
    75%{border-color:#ffae00;}
    100%{border-color:#00f2ff;}
}

input{
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    text-align:center;
    font-size:18px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00f2ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ff00c8;
    color:white;
}

/* CONTENIDO */
.container{
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:25px;
    backdrop-filter: blur(20px);
    border:3px solid transparent;
    animation:borderGlow 6s linear infinite;
    text-align:center;
}

canvas{
    margin-top:20px;
}
</style>
</head>
<body>

<!-- PANTALLA DE PIN -->
<div id="lockScreen">
    <div class="pin-box">
        <h2>🔐 Acceso Premium</h2>
        <input type="password" id="pinInput" placeholder="ngarcia">
        <br>
        <button onclick="verificarPin()">Entrar</button>
        <p id="error" style="color:red;"></p>
    </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="container">
    <h1>🚀 Productividad Ultra VIP</h1>
    <canvas id="grafica"></canvas>
</div>

<script>

// 🔐 CAMBIA TU PIN AQUÍ
const PIN_CORRECTO = "1234";

function verificarPin(){
    const pin = document.getElementById("pinInput").value;
    if(pin === PIN_CORRECTO){
        document.getElementById("lockScreen").style.display="none";
    }else{
        document.getElementById("error").innerText="PIN Incorrecto";
    }
}

// 📊 GRÁFICA DINÁMICA
const ctx = document.getElementById('grafica').getContext('2d');

let colores = ["#00f2ff","#ff00c8","#00ff88","#ffae00"];
let colorIndex = 0;

const grafica = new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Lun','Mar','Mié','Jue','Vie','Sáb'],
        datasets: [{
            label: 'Productividad %',
            data: [110,120,105,130,125,140],
            borderColor: colores[0],
            backgroundColor: 'rgba(0,242,255,0.2)',
            borderWidth: 4,
            tension:0.4
        }]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{
                labels:{color:'white'}
            }
        },
        scales:{
            x:{ticks:{color:'white'}},
            y:{ticks:{color:'white'}}
        }
    }
});

// CAMBIO DE COLOR AUTOMÁTICO
setInterval(()=>{
    colorIndex++;
    if(colorIndex >= colores.length){
        colorIndex = 0;
    }
    grafica.data.datasets[0].borderColor = colores[colorIndex];
    grafica.update();
},1500);

</script>

</body>
  </html>
