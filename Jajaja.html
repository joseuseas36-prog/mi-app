<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Productividad Semanal y Mensual</title>
<style>
body{
    font-family:Arial;
    background:#1e2a3a;
    padding:20px;
    color:white;
    text-align:center;
}
.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:20px;
    max-width:800px;
    margin:auto;
}
h2{
    color:#1e3c72;
}
.semana{
    background:#e9f0fc;
    padding:15px;
    border-radius:15px;
    margin:20px 0;
}
.dias{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
    margin:10px 0;
}
.dias div{
    display:flex;
    flex-direction:column;
}
.dias label{
    font-weight:bold;
    font-size:0.8rem;
}
.dias input{
    padding:5px;
    border-radius:20px;
    border:2px solid #3498db;
    text-align:center;
    width:100%;
}
button{
    padding:10px 30px;
    background:#ffc107;
    border:none;
    border-radius:40px;
    font-weight:bold;
    cursor:pointer;
    margin:10px;
}
.result{
    background:#eef2f6;
    padding:15px;
    border-radius:15px;
    margin-top:20px;
    font-size:1.2rem;
}
.result span{
    font-weight:bold;
    color:#1e3c72;
    background:#ffc107;
    padding:3px 15px;
    border-radius:30px;
    display:inline-block;
    margin:3px;
}
</style>
</head>
<body>

<div class="container">

<h2>📊 PRODUCTIVIDAD SEMANAL Y MENSUAL</h2>

<!-- Semana 1 -->
<div class="semana" id="semana1">
    <h3>📅 SEMANA 1</h3>
    <div class="dias">
        <div><label>Lun %</label><input type="number" id="s1d1" value="124" step="0.1"></div>
        <div><label>Mar %</label><input type="number" id="s1d2" value="146" step="0.1"></div>
        <div><label>Mié %</label><input type="number" id="s1d3" value="120" step="0.1"></div>
        <div><label>Jue %</label><input type="number" id="s1d4" value="100" step="0.1"></div>
        <div><label>Vie %</label><input type="number" id="s1d5" value="79" step="0.1"></div>
        <div><label>Sáb %</label><input type="number" id="s1d6" value="130" step="0.1"></div>
    </div>
    <p>📈 % Semana 1: <strong id="semana1Total">116.5%</strong></p>
</div>

<!-- Semana 2 -->
<div class="semana" id="semana2">
    <h3>📅 SEMANA 2</h3>
    <div class="dias">
        <div><label>Lun %</label><input type="number" id="s2d1" value="110" step="0.1"></div>
        <div><label>Mar %</label><input type="number" id="s2d2" value="110" step="0.1"></div>
        <div><label>Mié %</label><input type="number" id="s2d3" value="110" step="0.1"></div>
        <div><label>Jue %</label><input type="number" id="s2d4" value="110" step="0.1"></div>
        <div><label>Vie %</label><input type="number" id="s2d5" value="110" step="0.1"></div>
        <div><label>Sáb %</label><input type="number" id="s2d6" value="110" step="0.1"></div>
    </div>
    <p>📈 % Semana 2: <strong id="semana2Total">110.0%</strong></p>
</div>

<!-- Semana 3 -->
<div class="semana" id="semana3">
    <h3>📅 SEMANA 3</h3>
    <div class="dias">
        <div><label>Lun %</label><input type="number" id="s3d1" value="101" step="0.1"></div>
        <div><label>Mar %</label><input type="number" id="s3d2" value="101" step="0.1"></div>
        <div><label>Mié %</label><input type="number" id="s3d3" value="101" step="0.1"></div>
        <div><label>Jue %</label><input type="number" id="s3d4" value="101" step="0.1"></div>
        <div><label>Vie %</label><input type="number" id="s3d5" value="101" step="0.1"></div>
        <div><label>Sáb %</label><input type="number" id="s3d6" value="101" step="0.1"></div>
    </div>
    <p>📈 % Semana 3: <strong id="semana3Total">101.0%</strong></p>
</div>

<!-- Semana 4 -->
<div class="semana" id="semana4">
    <h3>📅 SEMANA 4</h3>
    <div class="dias">
        <div><label>Lun %</label><input type="number" id="s4d1" value="104" step="0.1"></div>
        <div><label>Mar %</label><input type="number" id="s4d2" value="104" step="0.1"></div>
        <div><label>Mié %</label><input type="number" id="s4d3" value="104" step="0.1"></div>
        <div><label>Jue %</label><input type="number" id="s4d4" value="104" step="0.1"></div>
        <div><label>Vie %</label><input type="number" id="s4d5" value="104" step="0.1"></div>
        <div><label>Sáb %</label><input type="number" id="s4d6" value="104" step="0.1"></div>
    </div>
    <p>📈 % Semana 4: <strong id="semana4Total">104.0%</strong></p>
</div>

<button onclick="calcularMensual()">CALCULAR MENSUAL</button>

<div class="result" id="resultado">
    <p>📊 Promedio mensual: <span id="mensual">108.0%</span></p>
    <p>🎯 Rango: <span id="rango">100% - 109.99%</span></p>
    <p>💰 Incentivo: <span id="incentivo">C$ 2,700</span></p>
</div>

</div>

<script>
function calcularSemana(semana){
    let suma = 0;
    let count = 6;
    for(let i=1; i<=6; i++){
        let val = parseFloat(document.getElementById(`${semana}d${i}`).value) || 0;
        suma += val;
    }
    let promedio = (suma / count).toFixed(1);
    document.getElementById(`${semana}Total`).innerText = promedio + '%';
    return parseFloat(promedio);
}

function calcularMensual(){
    let s1 = calcularSemana('s1');
    let s2 = calcularSemana('s2');
    let s3 = calcularSemana('s3');
    let s4 = calcularSemana('s4');
    
    let mensual = (s1 + s2 + s3 + s4) / 4;
    document.getElementById('mensual').innerText = mensual.toFixed(1) + '%';
    
    let rango = '', incentivo = 0;
    if(mensual >= 130){ rango="130% o más"; incentivo=3150; }
    else if(mensual >= 120){ rango="120% - 129.99%"; incentivo=3000; }
    else if(mensual >= 110){ rango="110% - 119.99%"; incentivo=2850; }
    else if(mensual >= 100){ rango="100% - 109.99%"; incentivo=2700; }
    else if(mensual >= 90){ rango="90% - 99.99%"; incentivo=2400; }
    else if(mensual >= 80){ rango="80% - 89.99%"; incentivo=2100; }
    else { rango="Menos de 80%"; incentivo=0; }
    
    document.getElementById('rango').innerText = rango;
    document.getElementById('incentivo').innerText = 'C$ ' + incentivo;
}

// Inicializar
calcularMensual();
</script>

</body>
</html>
